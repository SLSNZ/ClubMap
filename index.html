<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SLSNZ Club Finder</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root {
      --sls-blue: #006BB6;
      --sls-red: #E21F26;
      --sls-yellow: #FFDA00;
      --panel-bg: #ffffff;
      --muted: #5f6b7a;
      --border: #d8dee8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f6fa;
      color: #172033;
    }

    .club-finder {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, var(--sls-blue), #0069b4);
      color: white;
      padding: 18px 22px;
    }

    .header h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.2;
    }

    .header p {
      margin: 6px 0 0;
      opacity: 0.92;
      font-size: 14px;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      padding: 12px 14px;
      background: var(--panel-bg);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      z-index: 500;
    }

    .search-wrap {
      flex: 1 1 280px;
      min-width: 230px;
    }

    input[type="search"] {
      width: 100%;
      padding: 11px 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
    }

    button {
      padding: 11px 14px;
      border: 0;
      border-radius: 8px;
      background: var(--sls-blue);
      color: white;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    button.secondary {
      background: #edf2f7;
      color: #172033;
    }

    button:hover {
      filter: brightness(0.95);
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      flex: 1;
      min-height: 0;
    }

    .sidebar {
      background: white;
      border-right: 1px solid var(--border);
      overflow: auto;
      max-height: calc(95vh - 133px);
    }

    .results-header {
      position: sticky;
      top: 0;
      background: white;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      color: var(--muted);
      z-index: 300;
    }

    .club-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .club-item {
      padding: 14px;
      border-bottom: 1px solid #eef2f7;
      cursor: pointer;
    }

    .club-item:hover {
      background: #f7f9fc;
    }

    .club-item strong {
      display: block;
      font-size: 15px;
      margin-bottom: 5px;
    }

    .club-item a {
      color: var(--sls-blue);
      font-size: 13px;
      text-decoration: none;
    }


    #map {
      width: 100%;
      height: 700px;
      }

    .sidebar {
    max-height: 700px;
    }
    .club-popup h3 {
      margin: 0 0 6px;
      font-size: 16px;
    }

    .club-popup a {
      display: inline-block;
      margin-top: 5px;
      color: var(--sls-blue);
    }

    .club-cap {
      display: block;
      width: 150px;
      max-width: 100%;
      margin: 4px 0 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
    }

    .popup-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 8px;
    }

    .club-popup .popup-actions a {
      margin-top: 0;
      padding: 7px 9px;
      border-radius: 999px;
      background: #f3f6fa;
      text-decoration: none;
      font-weight: 700;
      font-size: 12px;
    }

    .club-popup .popup-actions a.primary-action {
      background: var(--sls-blue);
      color: #fff;
    }

    .club-popup .popup-actions a.safeswim-action {
      background: var(--sls-yellow);
      color: #172033;
    }

    .custom-marker {
      width: 26px;
      height: 26px;
      border-radius: 50% 50% 50% 0;
      background: var(--sls-red);
      border: 3px solid var(--sls-yellow);
      transform: rotate(-45deg);
      box-shadow: 0 2px 7px rgba(0,0,0,0.35);
    }

    .custom-marker::after {
      content: "";
      width: 8px;
      height: 8px;
      background: white;
      position: absolute;
      border-radius: 50%;
      top: 6px;
      left: 6px;
    }

    @media (max-width: 800px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        max-height: 260px;
        order: 2;
        border-right: 0;
        border-top: 1px solid var(--border);
      }

      #map {
        height: 58vh;
        min-height: 420px;
      }

      .header h1 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
  <main class="club-finder">
    <section class="header">
      <h1>SLSNZ Club Finder</h1>
      <p>Search for a surf lifesaving club and view club details.</p>
    </section>

    <section class="controls">
      <div class="search-wrap">
        <input id="searchBox" type="search" placeholder="Search by club name..." autocomplete="off" />
      </div>
      <button id="resetButton" type="button" class="secondary">Reset map</button>
    </section>

    <section class="layout">
      <aside class="sidebar">
        <div id="resultsHeader" class="results-header"></div>
        <ul id="clubList" class="club-list"></ul>
      </aside>
      <div id="map"></div>
    </section>
  </main>

    function normaliseClubName(name) {
      return name
        .toLowerCase()
        .replace(/&/g, " and ")
        .replace(/\b(surflifesaving|surf life saving|surf lifesaving|surf rescue|lifeguard service|volunteer lifeguard service|surf lifeguards|lifeguards|lifeguard|slsl|slsc|slsp|sls|lsc|ls|vls|crs|inc)\b/g, " ")
        .replace(/[^a-z0-9]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function getCapImage(club) {
      const key = normaliseClubName(club.name);
      return capLookup[key] || "";
    }

    function safeSwimUrl(club) {
      const aliases = {
        "baylys beach": "baylys-beach",
        "bethells beach": "bethells-beach",
        "mount maunganui": "mount-maunganui",
        "mt maunganui": "mount-maunganui",
        "omaha beach": "omaha",
        "pukehina": "pukehina-beach",
        "whanganui": "wanganui",
        "tolaga bay": "tolaga-bay",
        "tologa bay": "tolaga-bay"
      };
      const key = normaliseClubName(club.name);
      const slug = aliases[key] || key.replace(/\s+/g, "-");
      return `https://safeswim.org.nz/locations/${slug}`;
    }

    const map = L.map("map", {
      scrollWheelZoom: true
    }).setView([-41.0, 174.0], 6);

    L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
      attribution: "&copy; OpenStreetMap contributors &copy; CARTO",
      maxZoom: 19
    }).addTo(map);

    const clubIcon = L.divIcon({
      className: "",
      html: "<div class='custom-marker'></div>",
      iconSize: [26, 26],
      iconAnchor: [13, 26],
      popupAnchor: [0, -26]
    });

    const markers = [];
    function websiteLink(url) {
      if (!url) return "";
      const safeUrl = url.startsWith("http") ? url : `https://${url}`;
      return `<a href="${safeUrl}" target="_blank" rel="noopener">Visit club website</a>`;
    }

    function popupHtml(club) {
      const capImage = getCapImage(club);
      const capHtml = capImage
        ? `<img class="club-cap" src="${capImage}" alt="${club.name} club cap" loading="lazy" onerror="this.style.display='none'">`
        : "";

      return `
        <div class="club-popup">
          <h3>${club.name}</h3>
          ${capHtml}
          <div class="popup-actions">
            ${club.website ? websiteLink(club.website).replace(">Visit club website<", " class='primary-action'>Club website<") : ""}
            <a class="safeswim-action" href="${safeSwimUrl(club)}" target="_blank" rel="noopener">View on SafeSwim</a>
          </div>
        </div>
      `;
    }

    clubs.forEach((club, index) => {
      const marker = L.marker([club.lat, club.lng], { icon: clubIcon })
        .addTo(map)
        .bindPopup(popupHtml(club));

      markers.push({ club, marker, index });
    });

    const group = L.featureGroup(markers.map(item => item.marker));
    map.fitBounds(group.getBounds().pad(0.02));

    const searchBox = document.getElementById("searchBox");
    const clubList = document.getElementById("clubList");
    const resultsHeader = document.getElementById("resultsHeader");

    function filteredMarkers() {
      const term = searchBox.value.trim().toLowerCase();
      return markers
        .filter(item => item.club.name.toLowerCase().includes(term))
        .sort((a, b) => a.club.name.localeCompare(b.club.name));
    }

    function renderList() {
      const items = filteredMarkers();

      resultsHeader.textContent = `${items.length} club${items.length === 1 ? "" : "s"} shown`;

      clubList.innerHTML = items.map(item => {
        const website = item.club.website
          ? `<a href="${item.club.website}" target="_blank" rel="noopener">Website</a> · `
          : "";

        return `
          <li class="club-item" data-index="${item.index}">
            <strong>${item.club.name}</strong>
            ${website ? website.replace(" · ", "") : ""}
          </li>
        `;
      }).join("");
    }

    function updateVisibleMarkers() {
      const visible = new Set(filteredMarkers().map(item => item.index));

      markers.forEach(item => {
        if (visible.has(item.index)) {
          if (!map.hasLayer(item.marker)) item.marker.addTo(map);
        } else {
          if (map.hasLayer(item.marker)) map.removeLayer(item.marker);
        }
      });

      renderList();
    }

    function focusClub(index) {
      const item = markers.find(x => x.index === index);
      if (!item) return;

      map.setView([item.club.lat, item.club.lng], 14);
      item.marker.openPopup();
    }

    searchBox.addEventListener("input", updateVisibleMarkers);

    clubList.addEventListener("click", event => {
      const row = event.target.closest(".club-item");
      if (!row) return;
      focusClub(Number(row.dataset.index));
    });

    document.getElementById("resetButton").addEventListener("click", () => {
      searchBox.value = "";
      updateVisibleMarkers();
      map.fitBounds(group.getBounds().pad(0.02));
    });

    renderList();

    // Helps Leaflet calculate sizing when embedded in an iframe/CMS.
    setTimeout(() => map.invalidateSize(), 250);
    window.addEventListener("resize", () => map.invalidateSize());
  </script>
